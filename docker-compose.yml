version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: agrinova_mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
    volumes:
      - ${MOUNT_ROOT:-./docker-data}/mongodb:/data/db:rw
    networks:
      - agrinova_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrinova_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${BACKEND_PORT}
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - mongodb
    ports:
      - "${HOST_PORT}:${BACKEND_PORT}"
    networks:
      - agrinova_net
    volumes:
      - ${MOUNT_ROOT:-./docker-data}/backend/logs:/usr/src/app/logs:rw
      - ${MOUNT_ROOT:-./docker-data}/backend/uploads:/usr/src/app/uploads:rw
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --timeout=5 --retry-connrefused http://localhost:${BACKEND_PORT}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrinova_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - agrinova_net
    volumes:
      - ${MOUNT_ROOT:-./docker-data}/frontend/logs:/var/log/nginx:rw
      - ${MOUNT_ROOT:-./docker-data}/frontend/nginx/conf.d:/etc/nginx/conf.d:rw
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --timeout=5 --retry-connrefused http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  proxy:
    image: nginx:alpine
    container_name: agrinova_proxy
    restart: unless-stopped
    volumes:
      - ${MOUNT_ROOT:-./docker-data}/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "${PROXY_PORT}:80"
    networks:
      - agrinova_net
    depends_on:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --timeout=5 --retry-connrefused http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  agrinova_net:
    name: agrinova_net
    driver: bridge
